spring:
  application:
    name: civiclens-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:55432/${CIVICLENS_DB_NAME:civiclens}}
    username: ${SPRING_DATASOURCE_USERNAME:${CIVICLENS_DB_USER:civiclens}}
    password: ${SPRING_DATASOURCE_PASSWORD:${CIVICLENS_DB_PASSWORD:}}
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: always
      data-locations: classpath:data.sql
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
    defer-datasource-initialization: true

server:
  port: 8080

# JWT (override in production with env)
civiclens:
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-change-in-production-must-be-at-least-32-chars}
    expiration-ms: 86400000
  congress:
    api-base-url: https://api.congress.gov/v3
    api-key: ${CONGRESS_API_KEY:}
  voting:
    google-civic-api-key: ${GOOGLE_CIVIC_API_KEY:}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
