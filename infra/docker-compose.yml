services:
  postgres:
    image: postgres:15-alpine
    container_name: civiclens-postgres
    environment:
      POSTGRES_USER: ${CIVICLENS_DB_USER:-civiclens}
      POSTGRES_PASSWORD: ${CIVICLENS_DB_PASSWORD}
      POSTGRES_DB: ${CIVICLENS_DB_NAME:-civiclens}
    ports:
      - "55432:5432"
    volumes:
      - civiclens_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  civiclens_pgdata:
