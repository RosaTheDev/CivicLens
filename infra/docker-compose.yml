services:
  postgres:
    image: postgres:15-alpine
    container_name: civiclens-postgres
    environment:
      POSTGRES_USER: civiclens
      POSTGRES_PASSWORD: civiclens
      POSTGRES_DB: civiclens
    ports:
      - "55432:5432"
    volumes:
      - civiclens_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U civiclens -d civiclens"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  civiclens_pgdata:
